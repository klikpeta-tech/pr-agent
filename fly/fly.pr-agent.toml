# Fly.io config for pr-agent webhook server (https://github.com/The-PR-Agent/pr-agent)
# Deploy with: fly deploy --config fly/fly.pr-agent.toml --app klikpeta-pr-agent

app = 'klikpeta-pr-agent'
primary_region = 'sin'

[build]
  dockerfile = 'pr-agent.Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
